name: Build & Publish

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac-arm64
            os: macos-latest
          - platform: mac-x64
            os: macos-latest
          - platform: linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build -- --platform ${{ matrix.platform }}

      - name: Pack platform tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PLATFORM="${{ matrix.platform }}"
          cd "dist/pkg-${PLATFORM}"
          cp "${GITHUB_WORKSPACE}/README.md" .
          npm version --no-git-tag-version "${VERSION}-${PLATFORM}" 2>/dev/null || true
          npm pack
          mv *.tgz "${GITHUB_WORKSPACE}/cscience-npm-${PLATFORM}-${VERSION}.tgz"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}
          path: cscience-npm-*.tgz

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@cometix'

      - uses: actions/download-artifact@v4
        with:
          path: dist/npm
          merge-multiple: true

      - name: List tarballs
        run: ls -la dist/npm/

      - name: Publish platform packages (dist-tagged)
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for tgz in dist/npm/cscience-npm-*-"${VERSION}".tgz; do
            [ -f "$tgz" ] || continue
            basename="$(basename "$tgz" .tgz)"
            platform="${basename#cscience-npm-}"
            platform="${platform%-"${VERSION}"}"
            echo "Publishing platform: ${platform} (tag: ${platform})"
            npm publish "$tgz" --tag "${platform}" --access public --provenance
          done

      - name: Publish main package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          PKG_DIR="$(mktemp -d)"
          cp -r pkg/main/* "${PKG_DIR}/"

          cd "${PKG_DIR}"
          cp "${GITHUB_WORKSPACE}/README.md" .
          jq --arg v "${VERSION}" '
            .version = $v |
            .optionalDependencies = {
              "@cometix/cscience-mac-arm64": ("npm:@cometix/cscience@" + $v + "-mac-arm64"),
              "@cometix/cscience-mac-x64":   ("npm:@cometix/cscience@" + $v + "-mac-x64"),
              "@cometix/cscience-linux-x64":  ("npm:@cometix/cscience@" + $v + "-linux-x64")
            }
          ' package.json > tmp.json && mv tmp.json package.json

          cat package.json
          chmod +x bin/cscience.mjs
          npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/npm/*.tgz
          generate_release_notes: true
